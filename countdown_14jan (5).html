<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>14 जनवरी 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* मोबाइल ओनली एनफोर्स */
        @media (min-width: 769px) {
            body::before {
                content: '📱 कृपया मोबाइल डिवाइस पर खोलें';
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0,0,0,0.95);
                color: white;
                padding: 40px;
                border-radius: 20px;
                font-size: 22px;
                text-align: center;
                z-index: 9999;
                box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            }
            .container {
                display: none;
            }
        }

        /* स्टार्स एनिमेशन */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* फ्लोटिंग शेप्स */
        .floating-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #48dbfb, #0abde3);
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            right: 10%;
            top: 40%;
            animation-delay: 3s;
        }

        .shape:nth-child(3) {
            width: 70px;
            height: 70px;
            background: linear-gradient(225deg, #ff9ff3, #feca57);
            border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%;
            left: 20%;
            bottom: 30%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% { 
                transform: translate(0, 0) rotate(0deg);
            }
            25% { 
                transform: translate(20px, -30px) rotate(90deg);
            }
            50% { 
                transform: translate(-20px, -60px) rotate(180deg);
            }
            75% { 
                transform: translate(-30px, -30px) rotate(270deg);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideInDown 1s ease;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: white;
            font-size: 36px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(255,255,255,0.3);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .header .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 35px 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.25);
            animation: zoomIn 0.8s ease;
            margin-bottom: 30px;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .time-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .time-unit {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
            border-radius: 22px;
            padding: 25px 15px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .time-unit::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .time-unit:active {
            transform: scale(0.95);
        }

        .time-value {
            font-size: 48px;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.6), 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 8px;
            font-family: 'Arial', sans-serif;
            position: relative;
        }

        .time-label {
            font-size: 15px;
            color: rgba(255,255,255,0.95);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .message {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.08));
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
            50% { transform: scale(1.02); box-shadow: 0 0 35px rgba(255,255,255,0.4); }
        }

        .message .emoji {
            font-size: 32px;
            margin-bottom: 10px;
            display: inline-block;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .message p {
            color: white;
            font-size: 17px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* पल्स इफेक्ट */
        .pulse-effect {
            animation: quickPulse 0.4s ease;
        }

        @keyframes quickPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        /* इमेज बॉक्सेज */
        .image-boxes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 25px;
            animation: fadeInUp 1.2s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .image-box {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            animation: frameRotate 4s infinite ease-in-out;
        }

        @keyframes frameRotate {
            0%, 100% { 
                transform: rotate(0deg) scale(1);
                border-radius: 20px;
            }
            25% { 
                transform: rotate(1deg) scale(1.02);
                border-radius: 25px;
            }
            50% { 
                transform: rotate(0deg) scale(1.03);
                border-radius: 20px;
            }
            75% { 
                transform: rotate(-1deg) scale(1.02);
                border-radius: 25px;
            }
        }

        .image-box:nth-child(2) {
            animation-delay: 2s;
        }

        .image-box:nth-child(3) {
            animation-delay: 4s;
        }

        .image-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .image-box:hover::before {
            left: 100%;
        }

        .image-box:active {
            transform: scale(0.97);
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
        }

        .image-box img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            display: block;
        }

        .image-box:hover img {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        /* प्रिव्यू मोडल */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .preview-modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .preview-content {
            position: relative;
            max-width: 90%;
            max-height: 80%;
            animation: zoomInModal 0.3s ease;
        }

        @keyframes zoomInModal {
            from {
                opacity: 0;
                transform: scale(0.7);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .preview-content img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }

        .close-btn {
            position: absolute;
            top: -15px;
            right: -15px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            border: 3px solid white;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 10000;
        }

        .close-btn:active {
            transform: scale(0.9);
            background: linear-gradient(135deg, #ee5a6f, #ff6b6b);
        }

        /* स्टार जेनरेटर */
        .generate-stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🎉 14 जनवरी 2026 🎉</h1>
            <div class="subtitle">लाइव काउंटडाउन</div>
        </div>

        <div class="countdown-box">
            <div class="time-grid">
                <div class="time-unit">
                    <div class="time-value" id="days">00</div>
                    <div class="time-label">दिन</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="hours">00</div>
                    <div class="time-label">घंटे</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="minutes">00</div>
                    <div class="time-label">मिनट</div>
                </div>
                <div class="time-unit">
                    <div class="time-value" id="seconds">00</div>
                    <div class="time-label">सेकंड</div>
                </div>
            </div>

            <div class="message">
                <div class="emoji">✨</div>
                <p id="messageText">बस कुछ ही समय बाकी है!</p>
            </div>
        </div>

        <div class="image-boxes">
            <div class="image-box" onclick="openPreview('https://iili.io/feIPZg9.md.jpg')">
                <img src="https://iili.io/feIPZg9.md.jpg" alt="Image 1">
            </div>
            <div class="image-box" onclick="openPreview('https://iili.io/feIPQ07.md.jpg')">
                <img src="https://iili.io/feIPQ07.md.jpg" alt="Image 2">
            </div>
            <div class="image-box" onclick="openPreview('https://iili.io/feIPLfS.md.jpg')">
                <img src="https://iili.io/feIPLfS.md.jpg" alt="Image 3">
            </div>
        </div>
    </div>

    <!-- प्रिव्यू मोडल -->
    <div class="preview-modal" id="previewModal" onclick="closePreview()">
        <div class="preview-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closePreview()">×</button>
            <img id="previewImage" src="" alt="Preview">
        </div>
    </div>

    <script>
        // स्टार्स जेनरेट करें
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.animationDuration = (Math.random() * 2 + 2) + 's';
            starsContainer.appendChild(star);
        }

        const targetDate = new Date('2026-01-14T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                document.getElementById('messageText').textContent = '🎊 14 जनवरी आ गया है! 🎊';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            updateValue('days', days);
            updateValue('hours', hours);
            updateValue('minutes', minutes);
            updateValue('seconds', seconds);

            // मैसेज अपडेट करें
            if (days === 0 && hours === 0 && minutes === 0) {
                document.getElementById('messageText').textContent = '⏰ बस कुछ सेकंड बाकी हैं!';
            } else if (days === 0 && hours === 0) {
                document.getElementById('messageText').textContent = '⚡ कुछ मिनट बाकी हैं!';
            } else if (days === 0) {
                document.getElementById('messageText').textContent = '🔥 आज ही 14 जनवरी है!';
            } else if (days === 1) {
                document.getElementById('messageText').textContent = '🌟 सिर्फ 1 दिन बाकी है!';
            } else {
                document.getElementById('messageText').textContent = `✨ ${days} दिन बाकी हैं!`;
            }
        }

        function updateValue(id, value) {
            const element = document.getElementById(id);
            const formattedValue = value.toString().padStart(2, '0');
            
            if (element.textContent !== formattedValue) {
                element.textContent = formattedValue;
                element.classList.add('pulse-effect');
                setTimeout(() => {
                    element.classList.remove('pulse-effect');
                }, 400);
            }
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // प्रिव्यू फंक्शन
        function openPreview(imageSrc) {
            document.getElementById('previewImage').src = imageSrc;
            document.getElementById('previewModal').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }
    </script>
</body>
</html>
